<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f8f6;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a18;
      --text-secondary: #6b6b63;
      --green: #0d8a52;
      --red: #c94a30;
      --amber: #9a6200;
      --blue: #2563be;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display:flex;justify-content:space-between;align-items:center;height:56px;position:sticky;top:0;z-index:10; }

    .header-title { font-size:15px;font-weight:600; }
    .header-meta { font-family:'DM Mono';font-size:12px;color:var(--text-secondary); }

    .main { max-width:1100px;margin:0 auto;padding:32px 24px; }

    .tabs { display:flex;gap:2px;background:var(--border);padding:3px;border-radius:10px;width:fit-content;margin-bottom:28px; }

    .tab { padding:7px 18px;font-size:13px;border-radius:7px;background:transparent;border:none;cursor:pointer;color:var(--text-secondary); }
    .tab.active { background:var(--surface);color:var(--text);box-shadow:var(--shadow); }

    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}

    .period-pills{display:flex;gap:4px;margin-bottom:10px;}
    .pill{padding:5px 14px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;}
    .pill.active{background:var(--text);color:#fff;}

    .filter-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
    select{padding:6px;border-radius:6px;border:1px solid var(--border);}
  </style>
</head>
<body>

<div id="loading">Cargando datos...</div>

<div id="app" style="display:none">

<header class="header">
  <span class="header-title">Finance Dashboard</span>
  <span class="header-meta" id="last-updated"></span>
</header>

<main class="main">

<div class="tabs">
  <button class="tab active" onclick="switchTab('resumen')">Resumen</button>
  <button class="tab" onclick="switchTab('categorias')">Categorías</button>
  <button class="tab" onclick="switchTab('transacciones')">Transacciones</button>
</div>

<div id="tab-resumen" class="tab-panel active">

<div class="kpis" id="kpis"></div>

<div class="period-pills">
  <button class="pill active" onclick="setPeriod(6,this)">6m</button>
  <button class="pill" onclick="setPeriod(12,this)">12m</button>
  <button class="pill" onclick="setPeriod(24,this)">Todo</button>
</div>

<div class="filter-row">
  <span class="filter-label">Mes</span>
  <select id="month-selector" onchange="setMonthFilter(this.value)">
    <option value="">Todos los meses</option>
  </select>
</div>

<div class="card">
  <div class="card-title">Ingresos vs Gastos mensuales</div>
  <div class="chart-wrap-tall">
    <canvas id="chart-monthly"></canvas>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-title">Ahorro mensual</div>
    <div class="chart-wrap">
      <canvas id="chart-savings"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Gastos por categoría</div>
    <div class="chart-wrap">
      <canvas id="chart-donut"></canvas>
    </div>
  </div>
</div>

</div>

<div id="tab-categorias" class="tab-panel">
  <div class="card-title">Categorías</div>
</div>

<div id="tab-transacciones" class="tab-panel">
  <div class="filter-row">
    <span class="filter-label">Categoría</span>
    <select id="tx-cat-filter" onchange="renderTransacciones()">
      <option value="">Todas</option>
    </select>
    <select id="tx-month-filter" onchange="renderTransacciones()">
      <option value="">Todos los meses</option>
    </select>
  </div>

  <div class="card">
    <table class="tx-table" id="tx-table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Concepto</th>
          <th>Categoría</th>
          <th style="text-align:right">Monto</th>
        </tr>
      </thead>
      <tbody id="tx-body"></tbody>
    </table>
  </div>
</div>

</main>
</div>

<script src="js/state.js"></script>
<script src="js/filters.js"></script>

<script>
const DATA_URL = 'finance_data.json';

let charts = {};
let RAW = [];

function renderResumen(){
  renderKPIs();
  renderMonthly();
  if(typeof renderDonut === 'function') renderDonut();
}

async function init(){
  const res = await fetch(DATA_URL);
  RAW = await res.json();

  // inject into global state
  window.FINANCE_STATE.raw = RAW;

  if(typeof populateMonthSelector === 'function'){
    populateMonthSelector(RAW);
  }

  document.getElementById('app').style.display='block';
  document.getElementById('loading').style.display='none';

  renderResumen();
}

init();
</script>

</body>
</html>
