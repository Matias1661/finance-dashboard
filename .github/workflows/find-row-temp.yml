name: Find Sheet Row (temp)
on:
  workflow_dispatch:
    inputs:
      concepto:
        required: true
      fecha_partial:
        required: true

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install google-auth google-auth-httplib2 google-api-python-client
      - name: Find row
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          python3 - << 'EOF'
import os, json
from google.oauth2 import service_account
from googleapiclient.discovery import build

SHEET_ID = "1c0pyDHR_vvb_HD7LqH8Z5rCZ-W2DKVB7pNqAMKZ__OI"
SA_JSON  = json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT"])
SCOPES   = ["https://www.googleapis.com/auth/spreadsheets.readonly"]
creds    = service_account.Credentials.from_service_account_info(SA_JSON, scopes=SCOPES)
service  = build("sheets", "v4", credentials=creds)
result   = service.spreadsheets().values().get(
    spreadsheetId=SHEET_ID, range="Movimientos!A:K").execute()
rows = result.get("values", [])
for i, row in enumerate(rows):
    fecha    = row[0] if len(row) > 0 else ""
    concepto = row[1] if len(row) > 1 else ""
    importe  = row[2] if len(row) > 2 else ""
    if "AMAZON" in concepto.upper() and "06" in fecha and "2026" in fecha and "-63" in importe:
        nota = row[10] if len(row) > 10 else ""
        print(f"MATCH ROW={i+1} fecha={fecha} concepto={concepto} importe={importe} nota='{nota}'")
EOF
