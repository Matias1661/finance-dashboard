name: Sync Finance Data

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: sync-finance-data
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client requests

      - name: Generate finance_data.json
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: "1c0pyDHR_vvb_HD7LqH8Z5rCZ-W2DKVB7pNqAMKZ__OI"
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_MOVIMIENTOS_DATA_SOURCE_ID: "367d58ce-928b-4e31-832d-07707f876365"
          NOTION_RENDIMIENTO_DATA_SOURCE_ID: "93eda06b-9207-4589-b3f0-66be10ab9caf"
        run: python scripts/sync_finance_data.py

      - name: Commit and push if changed
        id: commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Matias1661/finance-dashboard.git
          git add finance_data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync finance data [$(date +'%Y-%m-%d')]"
            git pull --rebase origin main
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-pages.yml --ref main
