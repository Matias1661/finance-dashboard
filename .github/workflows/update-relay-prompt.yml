name: Update Relay Prompt

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Nuevo prompt para la celda A2 de la hoja "prompt relay"'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Write prompt to Google Sheets
        run: |
          pip install google-auth requests -q

          python3 << 'EOF'
          import json, time, base64, os, requests
          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          from cryptography.hazmat.backends import default_backend

          SPREADSHEET_ID = '1c0pyDHR_vvb_HD7LqH8Z5rCZ-W2DKVB7pNqAMKZ__OI'
          creds = json.loads(os.environ['GOOGLE_SERVICE_ACCOUNT_JSON'])
          prompt_text = os.environ['PROMPT']

          def b64url(data):
              if isinstance(data, str): data = data.encode()
              return base64.urlsafe_b64encode(data).rstrip(b'=').decode()

          now = int(time.time())
          header = b64url(json.dumps({"alg":"RS256","typ":"JWT"}))
          payload = b64url(json.dumps({
              "iss": creds['client_email'],
              "scope": "https://www.googleapis.com/auth/spreadsheets",
              "aud": "https://oauth2.googleapis.com/token",
              "iat": now, "exp": now + 3600
          }))
          signing_input = f"{header}.{payload}".encode()
          pk = serialization.load_pem_private_key(creds['private_key'].encode(), password=None, backend=default_backend())
          sig = pk.sign(signing_input, padding.PKCS1v15(), hashes.SHA256())
          jwt = f"{header}.{payload}.{b64url(sig)}"

          r = requests.post("https://oauth2.googleapis.com/token", data={
              "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
              "assertion": jwt
          })
          token = r.json()['access_token']

          url = f"https://sheets.googleapis.com/v4/spreadsheets/{SPREADSHEET_ID}/values/%27prompt%20relay%27!A2"
          r = requests.put(url,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              json={"range": "'prompt relay'!A2", "majorDimension": "ROWS", "values": [[prompt_text]]},
              params={"valueInputOption": "RAW"}
          )
          print("Status:", r.status_code)
          print(r.json())
          EOF
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PROMPT: ${{ inputs.prompt }}
