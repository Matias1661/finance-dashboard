name: Read Relay Prompt
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install google-auth google-api-python-client
      - name: Read prompt
        run: python3 scripts/read_relay_prompt.py
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_ID: 1c0pyDHR_vvb_HD7LqH8Z5rCZ-W2DKVB7pNqAMKZ__OI
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add prompt_relay_current.txt
          git diff --staged --quiet || git commit -m "temp: export relay prompt"
          git push
