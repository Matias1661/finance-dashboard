name: Sync Sociedad Data

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

concurrency:
  group: sync-sociedad-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Notion data and generate sociedad_data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 scripts/sync_sociedad_data.py

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Matias1661/finance-dashboard.git
          git add sociedad_data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync sociedad data [$(date +'%Y-%m-%d')]"
            git pull --rebase origin main
            git push origin main
          fi
