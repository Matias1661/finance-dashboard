name: Sync Sociedad Data

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

concurrency:
  group: sync-sociedad-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Notion data and generate sociedad_data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, urllib.request, urllib.error
          token  = os.environ["NOTION_TOKEN"]
          db_id  = "38933ce50e6880b9899beedec9156145"
          print(f"token={token[:12]}... db={db_id}", flush=True)
          rows, cursor, page_n = [], None, 0
          while True:
              page_n += 1
              body = {"page_size": 100}
              if cursor:
                  body["start_cursor"] = cursor
              req = urllib.request.Request(
                  f"https://api.notion.com/v1/databases/{db_id}/query",
                  data=json.dumps(body).encode(), method="POST"
              )
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("Notion-Version", "2022-06-28")
              req.add_header("Content-Type", "application/json")
              try:
                  with urllib.request.urlopen(req) as r:
                      d = json.loads(r.read().decode())
              except urllib.error.HTTPError as e:
                  print(f"HTTP {e.code}: {e.read().decode()}", flush=True); sys.exit(1)
              results = d.get("results", [])
              print(f"page {page_n}: {len(results)} rows", flush=True)
              for p in results:
                  props = p["properties"]
                  fecha = ((props.get("Fecha") or {}).get("date") or {}).get("start", "")[:10]
                  costo = (props.get("Costo") or {}).get("number") or 0
                  pagado = ((props.get("Pagado por") or {}).get("select") or {}).get("name") or "Otro"
                  concepto = (((props.get("Concepto") or {}).get("title") or [{}])[0]).get("plain_text", "")
                  if fecha:
                      rows.append({"fecha": fecha, "costo": costo, "pagado": pagado, "concepto": concepto})
              if d.get("has_more"):
                  cursor = d["next_cursor"]
              else:
                  break
          rows.sort(key=lambda r: r["fecha"])
          with open("sociedad_data.json", "w") as f:
              json.dump(rows, f, ensure_ascii=False, indent=2)
          print(f"Done: {len(rows)} rows", flush=True)
          PYEOF

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Matias1661/finance-dashboard.git
          git add sociedad_data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync sociedad data [$(date +'%Y-%m-%d')]"
            git pull --rebase origin main
            git push origin main
          fi
