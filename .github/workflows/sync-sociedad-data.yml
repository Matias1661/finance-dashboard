name: Sync Sociedad Data

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

concurrency:
  group: sync-sociedad-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check token
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          echo "Token length: ${#NOTION_TOKEN}"
          echo "Token prefix: ${NOTION_TOKEN:0:8}"

      - name: Test A - empty body
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error
          token = os.environ['NOTION_TOKEN']
          db_id = '38933ce50e6880b9899beedec9156145'
          req = urllib.request.Request(f'https://api.notion.com/v1/databases/{db_id}/query', data=b'{}', method='POST')
          req.add_header('Authorization', f'Bearer {token}')
          req.add_header('Notion-Version', '2022-06-28')
          req.add_header('Content-Type', 'application/json')
          try:
              with urllib.request.urlopen(req) as r:
                  d = json.loads(r.read())
                  print(f"OK: {len(d.get('results',[]))} results")
          except urllib.error.HTTPError as e:
              print(f"HTTP {e.code}: {e.read().decode()}")
          PYEOF

      - name: Test B - with page_size
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error
          token = os.environ['NOTION_TOKEN']
          db_id = '38933ce50e6880b9899beedec9156145'
          body = json.dumps({"page_size": 100}).encode()
          req = urllib.request.Request(f'https://api.notion.com/v1/databases/{db_id}/query', data=body, method='POST')
          req.add_header('Authorization', f'Bearer {token}')
          req.add_header('Notion-Version', '2022-06-28')
          req.add_header('Content-Type', 'application/json')
          try:
              with urllib.request.urlopen(req) as r:
                  d = json.loads(r.read())
                  print(f"OK: {len(d.get('results',[]))} results")
          except urllib.error.HTTPError as e:
              print(f"HTTP {e.code}: {e.read().decode()}")
          PYEOF

      - name: Fetch Notion data and generate sociedad_data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 scripts/sync_sociedad_data.py

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Matias1661/finance-dashboard.git
          git add sociedad_data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync sociedad data [$(date +'%Y-%m-%d')]"
            git pull --rebase origin main
            git push origin main
          fi
