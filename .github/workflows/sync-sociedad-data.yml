name: Sync Sociedad Data

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

concurrency:
  group: sync-sociedad-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Notion data and generate sociedad_data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error
          token = os.environ['NOTION_TOKEN']
          db_id = '38933ce50e6880b9899beedec9156145'
          rows, cursor = [], None
          while True:
              body = json.dumps({"page_size": 100, **({"start_cursor": cursor} if cursor else {})}).encode()
              req = urllib.request.Request(f'https://api.notion.com/v1/databases/{db_id}/query', data=body, method='POST')
              req.add_header('Authorization', f'Bearer {token}')
              req.add_header('Notion-Version', '2022-06-28')
              req.add_header('Content-Type', 'application/json')
              try:
                  with urllib.request.urlopen(req) as r:
                      d = json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f'HTTP {e.code}: {e.read().decode()}'); raise
              print(f'{len(d["results"])} rows, has_more={d["has_more"]}')
              for p in d['results']:
                  pr = p['properties']
                  fecha = ((pr.get('Fecha') or {}).get('date') or {}).get('start', '')[:10]
                  costo = (pr.get('Costo') or {}).get('number') or 0
                  pagado = ((pr.get('Pagado por') or {}).get('select') or {}).get('name') or 'Otro'
                  concepto = (((pr.get('Concepto') or {}).get('title') or [{}])[0]).get('plain_text', '')
                  if fecha:
                      rows.append({'fecha': fecha, 'costo': costo, 'pagado': pagado, 'concepto': concepto})
              if d['has_more']:
                  cursor = d['next_cursor']
              else:
                  break
          rows.sort(key=lambda r: r['fecha'])
          json.dump(rows, open('sociedad_data.json', 'w'), ensure_ascii=False, indent=2)
          print(f'Done: {len(rows)} rows')
          PYEOF

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Matias1661/finance-dashboard.git
          git add sociedad_data.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync sociedad data [$(date +'%Y-%m-%d')]"
            git pull --rebase origin main
            git push origin main
          fi
