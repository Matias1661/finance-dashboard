name: Update Sheet Cells

# Modos de uso:
#
# 1. FIND_AND_UPDATE (recomendado para notas) — busca la fila exacta en el Sheet:
#    { "ref": "main", "inputs": {
#        "find_fecha": "19/06/2026", "find_concepto": "WWW.AMAZON",
#        "find_importe": "-65.58", "find_column": "K", "find_value": "texto"
#    }}
#
# 2. Single — rango explícito:
#    { "ref": "main", "inputs": { "range": "Movimientos!D13", "value": "Departamento" } }
#
# 3. Batch:
#    { "ref": "main", "inputs": { "batch": "[{\"range\":\"Movimientos!D13\",\"value\":\"Departamento\"}]" } }

on:
  workflow_dispatch:
    inputs:
      find_fecha:
        description: "Fecha del movimiento (dd/MM/yyyy, ej: 19/06/2026)"
        required: false
        default: ""
      find_concepto:
        description: "Concepto exacto (ej: WWW.AMAZON)"
        required: false
        default: ""
      find_importe:
        description: "Importe como float (ej: -65.58)"
        required: false
        default: ""
      find_column:
        description: "Columna a escribir (ej: K)"
        required: false
        default: ""
      find_value:
        description: "Valor a escribir"
        required: false
        default: ""
      range:
        description: "Rango A1 (ej: Movimientos!D13)"
        required: false
        default: ""
      value:
        description: "Valor a escribir"
        required: false
        default: ""
      batch:
        description: "JSON array de actualizaciones [{range, value}, ...]"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Update sheet cells
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: "1c0pyDHR_vvb_HD7LqH8Z5rCZ-W2DKVB7pNqAMKZ__OI"
          SHEET_NAME: "Movimientos"
          FIND_FECHA: ${{ github.event.inputs.find_fecha }}
          FIND_CONCEPTO: ${{ github.event.inputs.find_concepto }}
          FIND_IMPORTE: ${{ github.event.inputs.find_importe }}
          FIND_COLUMN: ${{ github.event.inputs.find_column }}
          FIND_VALUE: ${{ github.event.inputs.find_value }}
          UPDATE_RANGE: ${{ github.event.inputs.range }}
          UPDATE_VALUE: ${{ github.event.inputs.value }}
          UPDATE_BATCH: ${{ github.event.inputs.batch }}
        run: python scripts/update_sheet_cells.py
